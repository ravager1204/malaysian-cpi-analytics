name: malaysian-cpi-analytics

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: airflow/Dockerfile
  env_file:
    - .env
  environment:
    DB_HOST: postgres
    DB_PORT: 5432
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/project/airflow/dags
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/cpi_analytics
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
    PYTHONPATH: /opt/airflow/project
  volumes:
    - ./:/opt/airflow/project
    - airflow_logs:/opt/airflow/logs
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_started
  profiles:
    - airflow

services:
  postgres:
    image: postgres:15
    container_name: cpi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: cpi_analytics
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
    ports:
      - "${DB_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d cpi_analytics"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: cpi-redis
    restart: unless-stopped
    profiles:
      - airflow

  airflow-init:
    <<: *airflow-common
    container_name: cpi-airflow-init
    entrypoint: /bin/bash
    command:
      - -lc
      - >
        airflow db migrate &&
        airflow users create
        --username ${AIRFLOW_ADMIN_USERNAME:-admin}
        --firstname CPI
        --lastname Admin
        --role Admin
        --email ${AIRFLOW_ADMIN_EMAIL:-admin@example.com}
        --password ${AIRFLOW_ADMIN_PASSWORD:-admin}
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    container_name: cpi-airflow-webserver
    command: webserver
    ports:
      - "${AIRFLOW_WEBSERVER_PORT:-8082}:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  airflow-scheduler:
    <<: *airflow-common
    container_name: cpi-airflow-scheduler
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  postgres_data:
  airflow_logs:
